body:
  text: 書蘇州醫報後愚父子前年在京曾約同志刊行存粹醫話四冊今三三社猶有出售者夫發醫報以交換智識洵為當今要務故其論與我同者可以引申與我異者不妨辯駁但為學識上之詰問不為意氣間之競爭斯可矣今讀此報陳聯芳君發刊詞云並是報以共同研究進一解更有一解真先得我心之言陸志東君西醫藥不適宜於中國論蓋即內經五方異宜之旨就中國而論尚且北地高寒南方卑濕患病因之而異用藥亦因之而變矧乎為遠隔重洋者乎西藥多用礦質在我華於周秦兩漢古方流傳尚多金石嗣後以性質悍戾漸漸改良多用草木古籍具在有可考也日前汪袞甫由日本返里談及日本近來以漢醫藥多效驗大有重翻舊案之勢陸仲一君駁廢中醫說中醫廢為能否治病有無成績斯言甚確但我國之醫學醫理極其博大精微我國之醫生卻不能人人窺見其博大精微是以為人治病或愈或否與西醫等至謂不合科學考中醫原理本是合天地人為一貫之學本是不知天時不明地氣不諳陰陽五行之遞嬗消息者本不足與言醫中醫本是哲學易所謂形而上者謂之道也西醫嘵嘵於科學就其言而論亦易所謂形而下者謂之藝也我中醫之能否存在在乎我醫生能否精進如人人刻苦用功高明者眾出而治病則必愈自然信仰人多雖無在上之提倡亦必不能廢棄可以理斷之潘叔衡君商榷審定醫書謂可奉為圭臬者惟素問靈樞難經本草及長沙諸書是欲取法乎上然魏晉唐宋以至有清諸賢之著述皆有發明皆不可不閱王卓吾君謂傷寒論為感症全書夫傷寒有五即天地間四時遞嬗之五氣膀胱主表五氣傷人盡從表入膀胱為寒水之經故曰傷寒或謂溫熱之邪從口鼻入者乃指穢濁鬱蒸之氣而言實在手經足經氣本貫串豈能截分一身為二溫熱之氣豈無傷於皮毛入於肌肉者乎書薛季綱服藥論後薛君謂凡事有利必有弊藥乃治病之品用之不當即有害身之禍雖參苓非能補體不過假人本有之氣而生長之此言極是蓋藥性皆偏不過能變化人之體氣何偏使歸於中和是以偏救偏之法至於生氣生血仍人身體氣中和臟腑自能相生非藥即能生之此以藥氣化病氣我中醫氣化之說也附薛君服藥論原文凡事有利必有弊我道之用藥亦然夫藥者乃治病之品固世界之寶也第用之不當即有害身之禍莫云不當即用之合病實亦有傷正之患患病服藥猶戰場之討救無異得救而覆敗北亦猶投藥而復人亡得救而奏凱歌亦猶投藥而病痊愈然病果全愈而正氣已傷其故何哉蓋汗吐下諸法盡人皆知為祛病傷正之藥而鮮明乎參苓等屬亦系乏身之品參苓非真能補體不過假人本有之氣而生長之系損一長二之法也若人之正氣已絕雖有回生之劑亦無起死之力矣所以坡老云藥以治病不可以養生食以養生不可以治病可見平人以食為寶病人以服藥為要若平人服藥何啻漢之武帝好武而徒傷賦庫耳且醫哲每曰用藥如用兵必當乃可故先賢云兵凶器也不得已而用之由此觀之兩者相較其理一也是故孔子云某未達不敢嘗有季康子深厚之誼而饋藥尚若是之慎也可笑世之富家不問情由不諸藥性不察虛實不明溫涼但憑一紙仿單謬服西藥之魚肝油拍勒托種種物品以為養生之法豈不危哉且夫一病必有一方一物必治一病豈有一藥而治多病者耶此意揣想若輩愚夫誠恐享壽故蒙外人之愚而促其夭乎實乃可笑而又可嘆者也更有一等中人用江湖一派專以偽藥愚人狂曰起死回生返老還童達者一見即可知其為偽也想人生既死氣滯而血凝脈道不行豈有再生之理乎人之生死循環之數也釋家雲南不生不滅可見有生必有死何能老而復童耶鄙人並非專敢偏見實為民族之前途悲觀不得已足篇胃警世之愚者祈敏賢之士勤為宣傳以展我中華之民族而免富者之痿弱幸甚幸甚書胡蕭梧君說瘧疾後胡君所說甚是而猶未詳盡考外感風寒暑濕燥五氣盡能成瘧而夏秋之交成於先受暑邪再加秋令寒涼風燥之氣外束者為多故內經瘧論亦以夏傷於暑為端而附載他瘧邵新甫於葉案後謂燥不為害其說非是辨為何邪大都在先寒後熱先熱後寒寒輕熱重熱多寒少熱己而寒寒己而熱寒熱並至分不清晰及有汗無汗汗多汗後熱解得汗不解並面色舌苔二便上別之尤要察是年之雨暘寒懊奚若又邪在何臟何腑或經或絡須於病起四末病起背脊病先身痛病先腰痛病先神瞀病先嘔惡及在晝在夜晝重夜重上別之大致外感五氣內應五臟以臟氣亦分風寒濕熱燥五氣也故陽虛體質易受寒燥濕之陰邪陰虛體質易受暑與風之陽邪或又錯綜雜受更宜細細分辨其他痰食瘴鬼虛勞諸瘧亦皆由此陰陽偏處五氣偏勝而來其理可一以貫之方書謂瘧不離乎少陽或又謂瘧不可用柴胡皆一偏之見總當視其病屬何邪邪在何處乃可立方處劑附胡君說瘧疾原文經曰核瘧皆生於風瘧必先有核而後成瘧是以謂之核瘧但所謂生於風者亦僅瘧之一種也瘧之類甚多受天空之風先患頭疼漸至成瘧曰風瘧受冬日之寒更冒暑風以致成瘧曰溫瘧但患是症者必先熱而後寒辨析之固自易易也至受沐浴之水寒夜月之風寒先寒後熱是曰寒瘧但熱而不寒常患嘔吐者曰癉瘧但寒而不熱素患陽虛者曰牝瘧他若濕瘧因襲濕而成食瘧因多食肥甘生冷之味瘴瘧感嶺南山嵐之毒瘧之類如此瘧之所由成者一陰一陽相爭而不相和邪氣舍於五臟不能與衛氣並行感之淺者同時而作道近則行速感之深者間日而作道遠則行遲也受病之原因既在風寒暑濕邪氣之所傷醫治之道自當各分經絡表汗而發散之也已書陸壽人六淫說後陸君謂六氣因人而異邪之陰陽隨人身之陰陽而變如感暑邪遇陰虛火旺之體其邪即隨之而化燥化火遇陽虛濕勝之體其邪即隨之而化濕化寒此言極是蓋外邪傷人即因人體氣何虛乘虛而入復因人體氣何偏乘偏而變此天氣地氣皆能變動人身之氣而人身之氣有偏亦即能變化所感之氣此亦我中醫氣化之說也陸群又謂風與火合則化熱燥屬陽風與寒合則化清燥屬陰此言更是蓋燥者干也五氣傷人惟燥最烈如其精少血衰津枯液涸不亡何待其於時也為秋其為氣也肅殺安得謂燥不為害自內經說秋傷於燥之文而醫家之忽略燥病也久矣如以氣化而言則溫滋之品用以化寒燥之氣涼潤之品用以化燥熱之氣有一定不易者附陸君六淫說原文六淫者即天之六氣風寒暑濕燥火也六氣各異變化無窮外感各病悉從六氣陰陽之偏駁而致如寒氣者為陰邪傷人之陽火氣者為陽邪傷人之陰液風為陰中之陽風邪傷人在冬令成傷寒病如在春末夏初天氣溫熱即成風溫病矣蓋風屬木其母水水性寒其子火火性熱因冬時感發者寒風也帶水寒之母氣春時即為解凍之溫風夏初又為解慍之薰風故兼火熱之子氣又能兼燥濕暑三氣故風者五氣悉能兼之為百病之長也此邪隨時令陰陽而變也暑為陽中之陰蓋濕為陰邪而與火合則名暑大凡六氣因人而變如感暑邪者遇陰虛火旺之體其暑即隨火而化燥邪歸營分為多故暑邪從陽上熏傷陰化燥以致神昏耳聾舌絳齦血若在陽虛濕盛之體則暑隨寒而化濕邪傷氣分者為多故濕邪從陰下潛而傷陽變濁以致脘痞嘔惡肢冷洞泄此邪之陰陽隨人身之陰陽而變蓋暴於烈日之中暑不張蓋此因暑熱而病矣偏於手太陰肺多屬熱邪有貪涼有飲冷此因暑熱而病反是寒夫貪涼則表寒飲冷則裡寒若貪涼而更兼飲冷則表裡皆寒其病在足太陽者身必無汗在足太陰者腹必隱痛表裡同病者乃症之寒者也此因暑而致病濕本陰邪亦有寒濕濕熱之辨寒濕者蓋濕本陰邪或值陰雨之日或在陽虛之體濕熱者以其母屬火蓋火生土土主濕或值暑濕交蒸之際或在陰虛偏熱之人或受於表或受於裡須分辨其寒濕濕熱風與火合則化熱燥屬陽風與寒合則化清燥屬陰蓋物之焦乾者為熱燥水之凍冷者為寒燥或燥於表或燥於裡或燥於上或燥於下必辨寒燥熱燥火本陽邪有天火人火之分君火相火之別真火假火之辨天火者外感天時之火人火者炙爆燥熱之火君火者心中炎灼之火相火者肝膽包焦龍雷之火真火即為實火假火乃為虛火此陰火陽火之所由以分也是以陰陽變化而成六氣之異也書張如先論九香蟲之功效後張如先君論九香蟲之功效此蟲色青黑入下焦肝腎味鹹入腎之力為多性溫且香故壯元陽而善走竄有以之入春方者是以論其功用誠如張君所言論其弊病則陰虧陽盛體質相火素旺者雖見氣滯不服為宜附張君論九香蟲之功效原文考本草九香蟲釋名黑兜蟲產於貴州永寧衛水河中其味鹹溫無毒形大如小指頭身如水龜其色青黑主治膈脘滯氣脾腎虧損壯元陽等症攝生方中烏龍丸用以為群藥近時滯氣方中用此者寥若晨星而以陳皮枳殼佛手鬱金等類流通氣機者實居多數要知九香蟲不但在胸脘脅肋疼痛方中用之佔優勝之地位即噎與咳嗽之症用之亦極有神效因噎乃氣機被窒用九香蟲佐以陳皮枳殼白前鬱金等品宣理氣分漸能易治若久咳不已氣道不宣胸脘痞滿宣化無功以此參加亦見應手此皆鄙人平日之實驗也切恐湮沒其功效故轉褒揚於刊末焉答友問晦淫惑疾左傳云晦淫惑疾晦為陰霆之氣或為迷惘之憂內經謂重陽者狂重陰者癲狂屬有餘癲屬不足來函所詢之病即惑疾也亦即癲也蓋病因除夕入廟而起遂獨語自笑若明若昧非必真有邪祟即此一團陰晦之邪陽氣充足之人雖觸之亦過而不留心陽素虛之人則著而成病於是乎失心迷惑矣昔喻嘉言李冠仙兩人醫案中曾詳載此病余今師其意以擬方用鹿角霜三錢犀角一線虎骨三錢脛骨最佳頭骨次之爪又次之箭黃耆高麗參白歸身甘杞子炒棗仁抱木茶神各一兩明雄黃白龍骨各七錢甘草不拌炒遠志桃奴各五錢以上各藥均研細末和均每臨睡服一食匙用酒一杯和調高粱紹酒皆可眼藥一料已畢後再察病情欲速則不達陸成一代答
