seq: 4
body:
  text: 惜分陰軒醫案卷四序聿自倉公著有診籍為醫案之權輿方書言其常醫案盡其變習醫者之不可僅閱方書也明矣蓋同一病也病原異而方藥為之大異同一病原也見證異而方藥又為之小異醫案則就所見之證幾端而對證用藥一一與之針鋒相對是以效如桴鼓辨證之法先辨其臟腑經絡氣血表裡病邪之所在再辨其風寒暑濕燥火痰食氣瘀病邪之何屬再辨其情志嗜欲病體之孰偏再辨其形狀神氣聲音舉止視聽寢息病體之虛否氣血陰陽虛復何在邪正相較誰勝誰負以天下無純虛之症亦無純實之症虛指正言之實指邪言之惟虛實最不易辨也今讀周君小農第四卷醫案辨證詳審試略舉數條以概其餘錢味青子案證見丹痧舌絳苔糜也辨知為溫邪爍營劫液而用斛芍玳犀張贅卿母案證見苔濁而干也辨知為溫邪夾痰而用半枳蔞連王秋肪案證見口灼煩悶也辨知為伏暑內發而用蒿藿益元吳克明案證見咳嗽繼即轉瘧以吐酸苦苔厚膩罩灰也辨知為伏邪內蘊膜原夾有痰飲而用半貝蔻樸張姓子案證見頭痛驟厥掐穴知痛不能言也辨知為腦疫而用羚羊蒿菊莊根壽室案證見頭痛脊強不能轉側牙灰口渴飲冷吐綠水也辨知為疫邪入厥陰而用熊羚貝齒張本案證見渴飲汗閉左脈數盛也辨知為暑毒內蘊而用益元紫雪李記妻案證見胸前脹滿也辨知為肝胃氣逆而用旋赭奇楠惲姓子案證見其氣逆鼻扇痰多噁心也辨知為風溫挾痰上湧肺脹而用葶苑膏杏張培子案證見其膚枯體痿便難溲赤也辨知為臟陰大傷餘熱尚蒸而用苓斛冬地管云泉母案證見腹痛拒按舌苔灰膩也辨知為伏熱夾滯內蘊而用清六導滯朱龍新案證見其腹熱當臍震躍也辨知為衝任伏熱而用蒿微銀連高萬青弟案證見其額鼻驟冷脈細足冷也辨知為傷食而厥而用楂曲四磨蔣子閒案證見其音低脈軟神情頹唐也辨知為癉瘧轉痢速進米飲而用蒿苓香連肖程氏案證見其唇燥齒光音微舌乾紅也辨知為氣液均虧伏邪不達而用沙斛粉蒿甄姓案證見大寒壯熱脈數舌紅也辨知邪熱為外寒束伏而用滑蘇荊萍王婦案證見妊痢純血也辨知為伏熱夾風而用荊槐柏榆莊姓子案證見疹斑口穢也辨知為積熱深沉而用化斑犀玳蔣珊案證見溺赤脈弱也辨知為伏邪夾虛而用蒿斛沙參高瑞笙女案證見痧隱沉睡溫透不穩也辨知為痧毒內攻而用翹蒡犀紅李泉案證見神迷牙黑也辨知為邪熱內伏而用香鼓七液張某室案證見下午發熱腹痛由於經停後也辨知為熱入血室而用靈蒲延胡厚昆子案證見咳逆詢得困驚而也辨知為伏溫熱痰射肺而用葦莖雄貝吳森奎子案證見白㾦枯燥舌絳齒黑神昏不省也辨知為暑厥氣液己涸邪熱內陷而用沙斛麥地邵寶記女案證見痧後咳喘音啞也辨知為痧火未清而用葦蟬猴棗培小姐案證見身熱沉迷腹痛瀉穢也辨知為伏暑夾積而用銀連紅曲陸成德案證見渴飲煩懊愎痛拒按也辨知為暑邪痰積而用潤字芩連程緒卿女案證見身熱足冷赭頰目淚也辨知為將發痧疹因寒因積用檉萍潤字高六婦案證見嘔惡煩悶溲赤神糊也辨知為伏暑夾氣兼夾下虛而用蒿苓丹芍陳永安案證見咳嗽力乏咽有痰膩辨知為肺窒有痰而用蒼楓止嗽袁福慶子案證見腹脹便瀉渴欲熱飲詢得常宿池邊也辨知為中下寒濕而用蠶卷濟生謝海昌案證見頓嗽根株不絕也辨知為肺虛留邪而用藥肺蒸露陳阿根媳案證見小產後暈厥脈微舌苔淡紅麵灰白也辨知為中寒肝橫痙厥而用麝鴿桂珀張余齡案證見裡熱盜汗寅卯陽舉而痛脈濡數苔黃也辨知為濕火下襲厥陰而用薇膽丹柏鄒新之妻案證見經停忽崩腹尚有形脈弦數轟熱嘔吐也辨知為肝熱積聚於血室而用楞楝楠醜陳女案證見足弱溲頻經停腹熱便艱形羸面青脈細舌紅無苔也辨知為陰涸虛熱而用扶元河車陸左案證見肢軟癢咳溲黃脈數舌紅也辨知為肺有蘊邪而用瀉白葦莖王佐卿妻案證見身熱脈濡數舌絳中剝嘔吐脘中有痞撐脹也辨知為積聚中宮氣機陰隔而用連莪玉樞任衡伯案證見肢倦面浮腹脹遺泄臍間動氣脈左數右濡也辨知為脾滯不運肝有溫熱而用莪樸連柏榮泉生案證見足痿手腫左指屈而不伸脈緊腹痛也辨知為濕毒傷人而用雞鳴瀉心魯梅軒案證見口眼喎斜左面筋躍動也辨知為外風中陽明絡而用羌防荊葛嚴君案證見左半身厥左足趾攣頭脹肢痠脈弦大不斂面紅苔白易怒健忘也辨知為火中風陽入絡兼夾痰濁而用丹芍黛蛤張景福姊案證見血後嘔吐口苦潮熱不寐脈細軟苔乾黑質絳轟灼盜汗肢顫也辨知為陰血虛極陽亢不潛而用斛芍磁朱秉禮妻案證見產後不時腹痛引及腰部夜則轟熱口燥也辨知為病在奇經營氣痹窒而用鼠矢龍涎李阿泉妻案證見伏暑產後熱喘鼻扇也辨知為風溫夾氣而用苑貝奇楠孫明琛妻案證見瘧後頭暈痰白味酸脈虛苔剝氣逆不寐也辨知為肝陽夾痰不降虛而夾實而用黛蛤英磁袁敬之岳案證見身熱嘔惡脘痛脈弦急苔薄黃吐黃綠涎也辨知為伏熱夾氣樞機閉塞而用連丹玉樞查姓婦案證見經阻行則脘腹攻痛身熱口渴形瘦二便秘脈伏也辨知為肝火氣閉血痹而用龍楠雞醜吳臣笏妻案證見寒熱三月腹痛脈弦數熱勢如潮也辨知為伏熱肝火併發而用柴丹蒿苓丁翼青妻案證見產後舌強音低頭暈少寐惡露通行脈弦大左甚也辨知為血虛內風上旋而用歸芍杞地榮氏案證見經阻三月始崩轉加腹痛嘔泄肢厥氣冷麵灰脈歇汗淋也辨知為血敗氣散陽飛急進獨參湯而用附桂萸蠣葉梅村案證見因驚癲症復發肝膽脈洪大苔黃也辨知為濕盛膽木漂浮而用連半貝磁周君醫案撮其要者如此苟非博學於平日審問於臨時慎思於診後其何能明辨以晰哉借分陰軒醫案三編風行一時醫家早奉為圭臬今卷四成集其又不脛而走可想而知燧忝屬同鄉粗諳醫理爰抉其奧窔筆而為之序
